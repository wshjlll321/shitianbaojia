<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- VTOL Fixed-wing body -->
  <ellipse cx="300" cy="210" rx="100" ry="22" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <!-- Wings -->
  <polygon points="200,205 400,205 380,215 220,215" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <!-- Wing extensions -->
  <line x1="180" y1="210" x2="420" y2="210" stroke="#64748b" stroke-width="2"/>
  <!-- Tail boom -->
  <rect x="400" y="206" width="80" height="8" fill="#475569" rx="3"/>
  <!-- V-tail -->
  <line x1="480" y1="210" x2="500" y2="185" stroke="#64748b" stroke-width="2.5"/>
  <line x1="480" y1="210" x2="500" y2="235" stroke="#64748b" stroke-width="2.5"/>
  <!-- VTOL rotors (4 corners) -->
  <circle cx="210" cy="205" r="25" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <circle cx="210" cy="205" r="3" fill="#3b82f6"/>
  <circle cx="390" cy="205" r="25" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <circle cx="390" cy="205" r="3" fill="#3b82f6"/>
  <circle cx="210" cy="218" r="20" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <circle cx="390" cy="218" r="20" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <!-- Nose camera -->
  <circle cx="200" cy="210" r="6" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="200" cy="210" r="2" fill="#f97316"/>
  <!-- Label -->
  <text x="300" y="345" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="14" font-weight="700" letter-spacing="3">V50 VTOL</text>
  <text x="300" y="365" text-anchor="middle" fill="#f97316" font-family="Arial" font-size="10" letter-spacing="2">200KM RANGE</text>
</svg>
