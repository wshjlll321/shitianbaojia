<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- Camera body -->
  <rect x="245" y="155" width="110" height="80" fill="#334155" rx="6" stroke="#64748b" stroke-width="1.5"/>
  <!-- 6 lens array (2x3) -->
  <circle cx="272" cy="180" r="12" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="300" cy="180" r="12" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="328" cy="180" r="12" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="272" cy="210" r="12" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="300" cy="210" r="12" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="328" cy="210" r="12" fill="#1e293b" stroke="#eab308" stroke-width="1.5"/>
  <!-- Inner lens dots -->
  <circle cx="272" cy="180" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="300" cy="180" r="4" fill="#ef4444" opacity="0.5"/>
  <circle cx="328" cy="180" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="272" cy="210" r="4" fill="#f97316" opacity="0.5"/>
  <circle cx="300" cy="210" r="4" fill="#a855f7" opacity="0.5"/>
  <circle cx="328" cy="210" r="4" fill="#eab308" opacity="0.5"/>
  <!-- Band labels -->
  <text x="272" y="178" text-anchor="middle" fill="white" font-size="5" font-weight="700">B</text>
  <text x="300" y="178" text-anchor="middle" fill="white" font-size="5" font-weight="700">G</text>
  <text x="328" y="178" text-anchor="middle" fill="white" font-size="5" font-weight="700">R</text>
  <text x="272" y="208" text-anchor="middle" fill="white" font-size="5" font-weight="700">RE</text>
  <text x="300" y="208" text-anchor="middle" fill="white" font-size="5" font-weight="700">NIR</text>
  <text x="328" y="208" text-anchor="middle" fill="white" font-size="5" font-weight="700">RGB</text>
  <!-- Mount point -->
  <rect x="283" y="235" width="34" height="16" fill="#475569" rx="3"/>
  <rect x="293" y="248" width="14" height="10" fill="#64748b" rx="2"/>
  <!-- Label -->
  <text x="300" y="310" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="13" font-weight="700" letter-spacing="2">MS-6B</text>
  <text x="300" y="330" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="10" letter-spacing="2">6-BAND MULTISPECTRAL</text>
</svg>
