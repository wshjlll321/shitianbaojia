<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- Gimbal body -->
  <rect x="260" y="160" width="80" height="100" fill="#334155" rx="10" stroke="#64748b" stroke-width="1.5"/>
  <!-- Camera lens -->
  <circle cx="300" cy="210" r="30" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="300" cy="210" r="20" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="300" cy="210" r="10" fill="#3b82f6" opacity="0.3"/>
  <circle cx="300" cy="210" r="4" fill="#3b82f6"/>
  <!-- IR sensor window -->
  <rect x="270" y="168" width="24" height="16" fill="#1e293b" rx="3" stroke="#f97316" stroke-width="1"/>
  <circle cx="282" cy="176" r="4" fill="#f97316" opacity="0.5"/>
  <!-- Mount bracket -->
  <rect x="285" y="140" width="30" height="24" fill="#475569" rx="4"/>
  <rect x="293" y="130" width="14" height="14" fill="#64748b" rx="2"/>
  <!-- Stabilization rings hint -->
  <ellipse cx="300" cy="190" rx="50" ry="8" fill="none" stroke="#64748b" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Label -->
  <text x="300" y="310" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="13" font-weight="700" letter-spacing="2">SIYI ZR30</text>
  <text x="300" y="330" text-anchor="middle" fill="#3b82f6" font-family="Arial" font-size="10" letter-spacing="2">30X OPTICAL ZOOM</text>
</svg>
