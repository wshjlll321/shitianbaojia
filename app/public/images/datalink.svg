<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- Main unit box -->
  <rect x="220" y="160" width="160" height="90" fill="#334155" rx="8" stroke="#64748b" stroke-width="1.5"/>
  <!-- Cooling fins -->
  <rect x="228" y="168" width="144" height="3" fill="#475569" rx="1"/>
  <rect x="228" y="178" width="144" height="3" fill="#475569" rx="1"/>
  <rect x="228" y="188" width="144" height="3" fill="#475569" rx="1"/>
  <!-- Status LEDs -->
  <circle cx="245" cy="230" r="4" fill="#22c55e"/>
  <circle cx="260" cy="230" r="4" fill="#3b82f6"/>
  <circle cx="275" cy="230" r="4" fill="#f97316"/>
  <!-- Antenna left -->
  <rect x="240" y="100" width="6" height="64" fill="#64748b" rx="3"/>
  <rect x="236" y="96" width="14" height="8" fill="#94a3b8" rx="2"/>
  <!-- Antenna right -->
  <rect x="354" y="100" width="6" height="64" fill="#64748b" rx="3"/>
  <rect x="350" y="96" width="14" height="8" fill="#94a3b8" rx="2"/>
  <!-- Signal waves -->
  <path d="M 248 90 Q 300 60 352 90" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <path d="M 240 80 Q 300 42 360 80" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  <path d="M 232 70 Q 300 24 368 70" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <!-- Connectors -->
  <rect x="235" y="250" width="16" height="10" fill="#1e293b" rx="2" stroke="#64748b" stroke-width="1"/>
  <rect x="260" y="250" width="16" height="10" fill="#1e293b" rx="2" stroke="#64748b" stroke-width="1"/>
  <rect x="325" y="250" width="30" height="10" fill="#1e293b" rx="2" stroke="#64748b" stroke-width="1"/>
  <!-- Label -->
  <text x="300" y="310" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="13" font-weight="700" letter-spacing="2">DL-100K</text>
  <text x="300" y="330" text-anchor="middle" fill="#22c55e" font-family="Arial" font-size="10" letter-spacing="2">100KM DATA LINK</text>
</svg>
