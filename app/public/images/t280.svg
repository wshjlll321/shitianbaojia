<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- Helicopter body -->
  <ellipse cx="300" cy="220" rx="120" ry="45" fill="url(#body)" stroke="#94a3b8" stroke-width="1.5"/>
  <ellipse cx="300" cy="215" rx="100" ry="35" fill="#475569"/>
  <!-- Tail boom -->
  <rect x="420" y="210" width="120" height="12" fill="#475569" rx="6"/>
  <polygon points="540,190 540,240 570,215" fill="#64748b" stroke="#94a3b8" stroke-width="1"/>
  <!-- Rotor mast -->
  <rect x="295" y="165" width="10" height="30" fill="#94a3b8" rx="2"/>
  <!-- Main rotor -->
  <ellipse cx="300" cy="162" rx="180" ry="6" fill="#94a3b8" opacity="0.7" transform="rotate(-5,300,162)"/>
  <!-- Landing skids -->
  <rect x="230" y="265" width="8" height="40" fill="#64748b" rx="2"/>
  <rect x="360" y="265" width="8" height="40" fill="#64748b" rx="2"/>
  <rect x="210" y="300" width="180" height="8" fill="#64748b" rx="4"/>
  <!-- Cockpit glass -->
  <ellipse cx="260" cy="210" rx="35" ry="25" fill="#3366ff" opacity="0.3" stroke="#3366ff" stroke-width="1"/>
  <!-- Model label -->
  <text x="300" y="350" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="14" font-weight="700" letter-spacing="3">T280 HEAVY-LIFT</text>
  <!-- Orange accent -->
  <rect x="350" y="203" width="30" height="6" fill="#f97316" rx="3"/>
  <circle cx="380" cy="225" r="5" fill="#f97316" opacity="0.8"/>
</svg>
