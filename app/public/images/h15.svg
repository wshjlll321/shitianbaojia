<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)" rx="16"/>
  <!-- Compact electric helicopter body -->
  <ellipse cx="300" cy="220" rx="80" ry="35" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
  <ellipse cx="300" cy="216" rx="65" ry="28" fill="#334155"/>
  <!-- Tail -->
  <rect x="380" y="212" width="90" height="9" fill="#475569" rx="4"/>
  <polygon points="470,198 470,235 495,216" fill="#64748b"/>
  <!-- Rotor mast -->
  <rect x="296" y="178" width="8" height="22" fill="#94a3b8" rx="2"/>
  <!-- Main rotor blades -->
  <ellipse cx="300" cy="176" rx="150" ry="5" fill="#3b82f6" opacity="0.5" transform="rotate(3,300,176)"/>
  <!-- Landing skids -->
  <rect x="250" y="255" width="6" height="30" fill="#64748b" rx="2"/>
  <rect x="342" y="255" width="6" height="30" fill="#64748b" rx="2"/>
  <rect x="230" y="282" width="140" height="6" fill="#64748b" rx="3"/>
  <!-- Cockpit -->
  <ellipse cx="270" cy="212" rx="28" ry="20" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1"/>
  <!-- Blue LED accents -->
  <circle cx="320" cy="230" r="3" fill="#3b82f6"/>
  <circle cx="340" cy="225" r="2" fill="#3b82f6" opacity="0.6"/>
  <!-- Battery indicator -->
  <rect x="285" y="235" width="30" height="5" fill="#22c55e" rx="2" opacity="0.7"/>
  <!-- Label -->
  <text x="300" y="345" text-anchor="middle" fill="#94a3b8" font-family="Arial" font-size="14" font-weight="700" letter-spacing="3">H15 ELECTRIC</text>
  <text x="300" y="365" text-anchor="middle" fill="#3b82f6" font-family="Arial" font-size="10" letter-spacing="2">ZERO EMISSION</text>
</svg>
